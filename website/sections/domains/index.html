    <style>
      body {
        margin: 0;
        background: #060b18;
        color: #dce8f8;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }
      .section-page-top {
        position: sticky;
        top: 0;
        z-index: 20;
        background: rgba(2, 6, 23, 0.92);
        border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        padding: 12px 18px;
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }
      .section-page-top a {
        color: #67e8f9;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.05em;
        font-size: 12px;
      }
      .domains-wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 26px 22px 60px;
      }
      .domains-intro {
        display: flex;
        align-items: baseline;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .domains-intro h2 {
        margin: 0;
        font-size: 26px;
        letter-spacing: 0.04em;
        color: #e8f2ff;
      }
      .domains-stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .dstat {
        border: 1px solid rgba(56, 189, 248, 0.3);
        background: rgba(14, 165, 233, 0.08);
        border-radius: 999px;
        padding: 4px 12px;
        font-size: 11.5px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #7dd3fc;
        text-transform: uppercase;
      }
      .domains-sub {
        color: #93a7c4;
        font-size: 13.5px;
        margin: 0 0 24px;
        max-width: 760px;
        line-height: 1.55;
      }
      .domains-grid-lp {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(212px, 1fr));
        gap: 14px;
      }
      /* Homepage-matching Domain Directory tiles (photo + live intel count) */
      .matrix-card { position: relative; display: block; overflow: hidden; border: 1px solid rgba(56,189,248,.22); border-radius: 14px; min-height: 150px; text-decoration: none; color: #e2e8f0; background: #04070f; transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease; }
      .matrix-card:hover { transform: translateY(-3px); border-color: rgba(56,189,248,.55); box-shadow: 0 10px 30px rgba(2,6,23,.6); }
      .matrix-card:hover .matrix-card-img { opacity: 1; transform: scale(1.04); }
      .matrix-card-img { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: .92; transition: opacity .2s ease, transform .3s ease; }
      .matrix-card::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(4,8,18,.12) 0%, rgba(4,8,18,.5) 52%, rgba(4,8,18,.9) 100%); }
      .matrix-card-body { position: relative; z-index: 2; padding: 14px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; }
      .matrix-card-top { display: flex; align-items: center; gap: 8px; }
      .matrix-status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; flex: 0 0 auto; }
      .matrix-card-name { font-size: 15px; font-weight: 800; letter-spacing: -.01em; text-shadow: 0 1px 6px rgba(2,6,23,.85); }
      .matrix-card-meta { display: flex; align-items: flex-end; justify-content: space-between; margin-top: 22px; }
      .matrix-card-count { font-size: 26px; font-weight: 900; color: #38bdf8; line-height: 1; text-shadow: 0 2px 10px rgba(2,6,23,.9); }
      .matrix-card-count small { font-size: 9px; font-weight: 700; color: #8aa2bf; display: block; letter-spacing: .12em; text-transform: uppercase; margin-top: 4px; }
      .matrix-card-arrow { font-size: 11px; color: #7dd3fc; font-weight: 800; letter-spacing: .1em; }
      .dom-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(15, 23, 42, 0.75), rgba(8, 13, 26, 0.9));
        padding: 16px 16px 14px;
        text-decoration: none;
        color: #dce8f8;
        position: relative;
        overflow: hidden;
        transition: border-color 0.16s ease, transform 0.16s ease, box-shadow 0.16s ease;
      }
      .dom-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--dom-color, #38bdf8);
      }
      .dom-card:hover {
        border-color: var(--dom-color, #38bdf8);
        transform: translateY(-2px);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.45);
      }
      .dom-head {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .dom-num {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 0.03em;
        background: color-mix(in srgb, var(--dom-color, #38bdf8) 16%, transparent);
        color: var(--dom-color, #38bdf8);
        flex: 0 0 auto;
      }
      .dom-name {
        font-size: 15.5px;
        font-weight: 800;
        letter-spacing: 0.03em;
        color: #eef5ff;
      }
      .dom-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .dom-tag {
        font-size: 10.5px;
        letter-spacing: 0.04em;
        color: #a9bcd9;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 999px;
        padding: 2.5px 8px;
        white-space: nowrap;
      }
      .dom-meta {
        margin-top: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #7d93b5;
      }
      .dom-meta b {
        color: #cfe2fb;
        font-weight: 800;
      }
      .dom-open {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--dom-color, #38bdf8);
      }
      .sectors-block {
        margin-top: 46px;
        border-top: 1px solid rgba(56, 189, 248, 0.16);
        padding-top: 26px;
      }
      .sectors-block h3 {
        margin: 0 0 6px;
        font-size: 18px;
        letter-spacing: 0.05em;
        color: #fbbf24;
      }
      .sectors-block p {
        margin: 0 0 16px;
        color: #93a7c4;
        font-size: 13px;
      }
      .sectors-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 8px;
      }
      .sector-link {
        display: block;
        text-decoration: none;
        color: #c3d3ec;
        font-size: 12.5px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: 9px;
        padding: 9px 12px;
        background: rgba(15, 23, 42, 0.55);
        transition: 0.14s ease;
      }
      .sector-link:hover {
        border-color: #fbbf24;
        color: #fff;
        background: rgba(251, 191, 36, 0.08);
      }
      @media (max-width: 640px) {
        .domains-wrap {
          padding: 20px 14px 48px;
        }
      }
