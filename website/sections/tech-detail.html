        font-size: 13px; font-weight: 800; color: #06131f;
        background: linear-gradient(140deg,#38bdf8,#22d3ee);
      }
      .td-sec-title { font-size: 17px; font-weight: 700; color: #e2f0ff; letter-spacing: .01em; }
      .td-text { font-size: 15px; line-height: 1.65; color: #c6d6ec; margin: 6px 0; }
      .td-pending { color: #6f83a3; font-style: italic; }
      .td-note { font-size: 12.5px; color: #7d93b4; margin: 6px 0; font-style: italic; }
      .td-list { margin: 6px 0; padding-left: 20px; }
      .td-list li { font-size: 15px; line-height: 1.6; color: #c6d6ec; margin: 3px 0; }
      .td-linkrow { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0 4px; }
      .td-link {
        font-size: 13px; font-weight: 600; text-decoration: none; color: #7dd3fc;
        background: rgba(56,189,248,.1); border: 1px solid rgba(56,189,248,.3);
        border-radius: 8px; padding: 7px 12px; transition: background .15s;
      }
      .td-link:hover { background: rgba(56,189,248,.22); }
      .td-specs { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0; }
      .td-spec {
        background: rgba(15,32,53,.7); border: 1px solid rgba(56,189,248,.18);
        border-radius: 10px; padding: 8px 12px; min-width: 120px;
      }
      .td-spec-k { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #6f88ab; }
      .td-spec-v { font-size: 14px; color: #dbe8fb; font-weight: 600; margin-top: 2px; }
      .td-companies { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0; }
      .td-company {
        font-size: 13px; color: #cbe6d6; background: rgba(34,197,94,.12);
        border: 1px solid rgba(34,197,94,.32); border-radius: 999px; padding: 5px 12px;
      }
      .td-life { margin: 6px 0; }
      .td-lifebadge {
        display: inline-block; font-size: 13px; font-weight: 700; color: #a7f3d0;
        background: rgba(16,185,129,.14); border: 1px solid rgba(16,185,129,.4);
        border-radius: 999px; padding: 5px 14px;
      }
      .td-glossary { margin: 8px 0; }
      .td-glossary dt { font-weight: 700; color: #e2f0ff; font-size: 14px; margin-top: 10px; }
      .td-glossary dd { margin: 2px 0 0; padding-left: 0; font-size: 14px; color: #b8cae4; line-height: 1.55; }
      .td-related { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin: 8px 0; }
      .td-relcard { display: flex; align-items: center; justify-content: space-between; gap: 8px;

        background: rgba(8,16,34,.6); border: 1px solid rgba(56,189,248,.16); transition: border-color .15s; }
      .td-relcard:hover { border-color: rgba(56,189,248,.5); }
      .td-relname { font-size: 13px; font-weight: 700; color: #eaf2ff; line-height: 1.25; }
      .td-relstage { flex: 0 0 auto; }
